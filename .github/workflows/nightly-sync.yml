name: Nightly Sync — main → develop

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Merge main into develop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if main has new commits
        id: diff
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count develop..origin/main)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"

      - name: Nothing to sync
        if: steps.diff.outputs.ahead == '0'
        run: echo "develop is already up to date with main — nothing to do."

      # ── Clean path ──────────────────────────────────────────────────────────

      - name: Attempt merge
        if: steps.diff.outputs.ahead != '0'
        id: merge
        run: |
          if git merge origin/main --no-edit -m "chore: nightly sync main → develop"; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            # Save the conflicted file list before the resolver touches them
            git diff --name-only --diff-filter=U > /tmp/conflicted_files.txt
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged develop
        if: steps.merge.outputs.status == 'clean'
        run: git push origin develop

      # ── Conflict path — ask Claude ────────────────────────────────────────

      - uses: actions/setup-node@v4
        if: steps.merge.outputs.status == 'conflict'
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        if: steps.merge.outputs.status == 'conflict'
        run: npm install @anthropic-ai/sdk --no-save --quiet

      - name: Resolve conflicts with Claude
        if: steps.merge.outputs.status == 'conflict'
        id: resolve
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # exit 0 → easy, resolved; exit 2 → complex; exit 1 → error
        # continue-on-error lets the next steps inspect the outcome
        continue-on-error: true
        run: node scripts/sync-resolve.js

      - name: Complete merge and push (Claude resolved)
        if: steps.merge.outputs.status == 'conflict' && steps.resolve.outcome == 'success'
        run: |
          # Stage the files Claude resolved
          while IFS= read -r file; do
            git add "$file"
          done < /tmp/conflicted_files.txt
          git commit --no-edit
          git push origin develop

      # ── Conflict path — too complex, close the PR ─────────────────────────

      - name: Create and close conflict PR
        if: steps.merge.outputs.status == 'conflict' && steps.resolve.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Avoid duplicate open PRs for the same sync conflict
            const { data: open } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:main`, base: 'develop',
            });
            if (open.length > 0) {
              core.warning('A sync PR is already open — skipping creation.');
              core.setFailed('Merge conflicts require manual resolution.');
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: 'chore: nightly sync main → develop',
              head: 'main',
              base: 'develop',
              body: [
                '> **Automated nightly sync — closed automatically by CI**',
                '',
                '## Merge conflicts detected',
                '',
                'Claude reviewed the conflicts and determined they require human judgment.',
                'This PR has been closed automatically.',
                '',
                '**Action required:** resolve the conflicts manually and merge `main` into `develop`.',
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner, repo,
              pull_number: pr.number,
              state: 'closed',
            });

            core.setFailed(
              `Conflicts too complex for auto-resolution. PR #${pr.number} created and closed.`
            );
